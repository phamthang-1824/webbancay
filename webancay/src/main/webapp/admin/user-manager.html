<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quản lý khách hàng - Admin</title>

    <link rel="stylesheet" href="../assets/css/sidebar-admin.css" />
    <link rel="stylesheet" href="../assets/css/topbar-admin.css" />
    <link rel="stylesheet" href="../assets/css/user-manager.css" />
    <link rel="stylesheet" href="../assets/css/formAdd.css" />
</head>
<body>
    <!-- SIDEBAR -->
    <div class="sidebar">
        <!-- HEADER -->
        <header>QL khách hàng</header>
        <a href="../admin.jsp" class="menu-item">Dashboard</a>
        <a href="product-manager.html" class="menu-item">Quản lý sản phẩm</a>
        <a href="category-manager.html" class="menu-item">Quản lý danh mục</a>
        <a href="order-manager.html" class="menu-item">Quản lý đơn hàng</a>
        <a href="user-manager.html" class="menu-item">Khách hàng</a>
        <a href="home-settings.html" class="menu-item">Banner / Trang chủ</a>
        <a href="contact-manager.html" class="menu-item">Liên hệ</a>
    </div>

    <!--    QUẢN LÝ TÀI KHOẢN KHÁCH HÀNG - customer-mangement       -->
    <div class="customer-management page">
        <div class="topbar">
            <div class="controls">
                <input type="text" class="search" id="searchCustomer" placeholder="Tìm khách hàng...">
                <button class="btn search">Tìm kiếm</button>
                <button id="btnAddCustomer" class="btn add">Thêm tài khoản</button>
            </div>
        </div>

        <!-- Bảng danh sách khách hàng -->
        <table class="customer-table">
            <thead>
            <tr>
                <th>ID</th>
                <th>Tên đăng nhập</th>
                <th>Email</th>
                <th>Vai trò</th>
                <th>Trạng thái</th>
                <th>Hành động</th>
            </tr>
            </thead>

            <tbody id="userList">
            <!-- JS sẽ thêm dữ liệu tại đây -->
            </tbody>
        </table>
    </div>

<!--    FORM THÊM TÀI KHOẢN NGƯỜI DÙNG      -->
    <div id="addCustomerForm" class="form-container hidden">
        <h2>Thêm tài khoản</h2>
        <form id="customerForm" class="form">
            <div class="form-group">
                <label for="userName">Tên đăng nhập</label>
                <input id="userName" type="text" placeholder="Nhập tên đăng nhập" required />
            </div>

            <div class="form-group">
                <label>Email</label>
                <input id="email" type="email" placeholder="Nhập email" required />
            </div>

            <div class="form-group">
                <label>Mật khẩu</label>
                <input id="password" type="password" placeholder="Nhập mật khẩu" required />
            </div>

            <div class="form-group">
                <label>Nhập lại mật khẩu</label>
                <input id="confirmPassword" type="password" placeholder="Nhập lại mật khẩu" required />
            </div>

            <div class="form-group">
                <label>Họ và tên</label>
                <input id="fullName" type="text" placeholder="Nhập họ và tên" required />
            </div>

            <div class="form-group">
                <label>Số điện thoại</label>
                <input id="phone" type="text" placeholder="Nhập số điện thoại" required />
            </div>

            <div class="form-group">
                <label>Địa chỉ</label>
                <input id="address" type="text" placeholder="Nhập địa chỉ" required />
            </div>

            <div class="form-group">
                <label>Quyền truy cập</label>
                <select id="role">
                    <option>Customer</option>
                    <option>Admin</option>
                </select>
            </div>

            <div class="form-group">
                <label>Quyền truy cập</label>
                <select id="status" required>
                    <option>Hoạt động</option>
                    <option>Tạm khóa</option>
                    <option>Ngừng hoạt động</option>
                </select>
            </div>

            <div class="form-buttons">
                <button id="cancelCustomer" type="button" class="btn cancel">Hủy</button>
                <button type="submit" class="btn submit">Thêm tài khoản</button>
            </div>

        </form>
    </div>

    <script src="../assets/js/user-manager.js"></script>
</body>
</html>
